types:
  File:
    description: A file on disk — its repo-relative path, basename, and semantic description.
    kind: Map
    fields:
      path: Symbol        # absolute or repo-relative path
      name: Symbol        # basename, e.g. "db.ts"
      folder: Folder
      description: Meaning
      comment: Meaning?   # optional analyst annotation

  Folder:
    description: A directory on disk — its path, name, and purpose description.
    kind: Map
    fields:
      path: Symbol
      name: Symbol
      description: Meaning
      comment: Meaning?   # optional analyst annotation

  Location:
    description: A precise point in source code — file, line, and optional column.
    kind: Map
    fields:
      file: File
      line: Symbol        # "42"
      column: Symbol      # "7" — optional by convention
      comment: Meaning?   # optional analyst annotation

  Span:
    description: A contiguous source range defined by a start and end Location.
    kind: Map
    fields:
      start: Location
      end: Location

