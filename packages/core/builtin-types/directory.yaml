types:
  # File / Folder / Location / Span used to live here. They have been removed:
  #
  # - File: every consumer (LSP symbols, Plan.relatedFiles) now uses a plain
  #   `file_path: Symbol` (or `[Symbol]` list) instead. File nodes were never
  #   deduplicated when embedded, so they accumulated thousands of duplicates
  #   without offering any unique queryable identity.
  # - Folder: only ever referenced from File, which itself is gone.
  # - Location / Span: replaced by flat `file_path` + `line` + `column` fields
  #   directly on each LspSymbol — one indexed lookup for "what symbols are in
  #   file X" instead of three nested map joins.
  #
  # This file is kept (empty) so the builtin-types dir loader still finds it.
