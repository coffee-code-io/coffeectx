types:
  TextContract:
    description: A natural-language agreement between two components — what each side is responsible for.
    kind: Map
    fields:
      description: Meaning
      parties:
        kind: List
        item: Symbol          # component, module, or function names involved
      obligations:
        kind: List
        item: Meaning         # one obligation per party or shared responsibility

  ArgValidator:
    description: A validation rule on a function argument — the invariant that must hold on entry.
    kind: Map
    fields:
      function: Symbol        # fully qualified function name (e.g. "UserService.createUser")
      argument: Symbol        # parameter name (e.g. "email")
      rule: Meaning           # invariant in natural language (e.g. "must be a valid RFC 5322 address")
      errorMessage: Meaning
      symbol:                 # the LspFunction or LspMethod node for this function (use { "$id": "uuid" })
        kind: Or
        types: [LspFunction, LspMethod]

  EntityMapping:
    description: A cardinality relationship between two domain entities — how many of each relate.
    kind: Map
    fields:
      from: Symbol            # source entity name
      to: Symbol              # target entity name
      cardinality: Symbol     # "1-1" | "1-many" | "many-1" | "many-many"
      description: Meaning

  Unique:
    description: A uniqueness constraint — the set of fields that must be unique for an entity.
    kind: Map
    fields:
      entity: Symbol
      fields:
        kind: List
        item: Symbol          # field names forming the unique key
      description: Meaning

  Relation:
    description: A named directed relation between two entities — type, cardinality, and semantics.
    kind: Map
    fields:
      from: Symbol
      to: Symbol
      name: Symbol            # verb or phrase labelling the relation (e.g. "owns", "depends-on")
      type: Symbol            # "association" | "aggregation" | "composition" | "dependency"
      cardinality: Symbol     # "1-1" | "1-many" | "many-many"
      description: Meaning

skills:
  ContractIndexing:
    description: Capture local data contracts, argument validators, and entity relationships from implementation code.
    prompt: |
      When analysing function implementations, data models, or validation logic, extract:

      TextContract — informal agreements between two modules or functions:
        description: what the contract says
        parties: list of function/module names involved (e.g. ["insertEntries", "buildEntryNode"])
        obligations: list of obligations, one per party

      Examples:
        { "$type": "TextContract", "description": "Caller must embed all meanings before passing embedMap to buildEntryNode", "parties": ["insertEntries", "buildEntryNode"], "obligations": ["insertEntries pre-computes all embeddings", "buildEntryNode reads from embedMap synchronously"] }

      ArgValidator — for each validation rule on a function parameter:
        function: fully qualified name (e.g. "Db.insertEntries")
        argument: parameter name
        rule: the invariant (e.g. "entries must be non-empty")
        errorMessage: the error returned when violated
        symbol: { "$id": "<uuid>" } of the LspFunction/LspMethod node if found via exact search

      Examples:
        { "$type": "ArgValidator", "function": "resolveYamlType", "argument": "spec", "rule": "Or/And kinds require at least 2 types in the types array", "errorMessage": "Or requires at least 2 types", "symbol": { "$id": "uuid-of-resolveYamlType" } }

      EntityMapping — for significant entity relationships:
        from / to: entity names
        cardinality: "1-1" | "1-many" | "many-1" | "many-many"
        description: meaning of the relationship

      Examples:
        { "$type": "EntityMapping", "from": "Skill", "to": "NamedType", "cardinality": "1-many", "description": "A skill references the named types it creates entries for" }

      Unique — for uniqueness constraints (DB indexes, business rules):
        entity: entity/table name
        fields: list of field names forming the unique key
        description: why this constraint exists

      Relation — for named directed relationships in the domain model:
        from / to: entity names
        name: verb or phrase (e.g. "owns", "depends-on")
        type: "association" | "aggregation" | "composition" | "dependency"
        cardinality: "1-1" | "1-many" | "many-many"
        description: semantic explanation

      Look for contracts in:
        - Function pre/post-condition comments
        - Validation libraries (Zod, Joi, Yup) schemas
        - JSDoc @param constraints
        - DB schema files (SQL, Prisma, Drizzle)
        - Interface and type definitions with semantic constraints
    types:
      - TextContract
      - ArgValidator
      - EntityMapping
      - Unique
      - Relation
