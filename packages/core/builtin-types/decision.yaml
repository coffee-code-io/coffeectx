types:
  Decision:
    description: A choice that shaped the codebase — what was decided and why.
    kind: Map
    fields:
      title: Symbol           # short imperative title, e.g. "Use SQLite for storage"
      rationale: Meaning      # why this was the right choice

  Alternative:
    description: An option that was considered but rejected in favour of something else.
    kind: Map
    fields:
      option: Symbol          # name of the rejected option, e.g. "PostgreSQL"
      reason: Meaning         # why it was not chosen

  Assumption:
    description: A belief about the environment, users, or system that has not been verified.
    kind: Map
    fields:
      description: Meaning    # the assumption itself
      risk: Meaning           # what breaks if the assumption is wrong

  ChangeEvent:
    description: A significant change to architecture, behavior, or dependencies that occurred at a point in time.
    kind: Map
    fields:
      name: Symbol            # short event name, e.g. "Switched embed model to text-embedding-3-small"
      description: Meaning    # what changed and why

skills:
  ArchitecturalDecisionIndexing:
    description: Extract decisions, rejected alternatives, assumptions, and notable change events from agent logs.
    prompt: |
      Read the agent log events below and extract coding decisions.
      Cast a wide net — extract both local implementation choices AND broader design decisions.
      Only extract entries you are confident about from the event data.

      ── Decision ──────────────────────────────────────────────────────────────
      Any deliberate choice made while writing or changing code.
      This includes small local decisions, not just big architecture ones.
      Extract when you see a function, module, or approach chosen for a reason.
        title     — short imperative phrase describing what was decided
        rationale — why this choice was made; be specific

      Examples:
        { "$type": "Decision", "title": "Rewrite annotateNode to call insertEntries internally", "rationale": "Eliminated duplicated validation and embedding logic by routing through the single insertEntries path" }
        { "$type": "Decision", "title": "Use better-sqlite3 over sql.js", "rationale": "Synchronous API fits the use case; no WASM overhead; significantly faster for embedded use" }
        { "$type": "Decision", "title": "Return verbose errors from insertEntries instead of throwing", "rationale": "Lets the caller report all failures at once rather than stopping on the first error" }

      ── Alternative ───────────────────────────────────────────────────────────
      An option that was considered and rejected in favour of something else.
      Extract when you see something explicitly ruled out or compared unfavorably.
        option  — name or short description of the rejected option
        reason  — why it was not chosen

      Examples:
        { "$type": "Alternative", "option": "Separate annotateNode tool", "reason": "Would duplicate validation and embed logic already in insertEntries" }
        { "$type": "Alternative", "option": "Postgres", "reason": "Requires a server process; too heavy for an embedded CLI tool" }

      ── Assumption ────────────────────────────────────────────────────────────
      A belief taken for granted but not verified — about environment, users, or code behavior.
      Extract when you see "we assume", "assuming", or an implicit constraint that could break.
        description — the assumption itself
        risk        — what breaks if it is wrong

      Examples:
        { "$type": "Assumption", "description": "embed dimension matches the vec table dimension in the existing DB", "risk": "sqlite-vec will reject inserts if dimensions differ" }
        { "$type": "Assumption", "description": "Users run a single MCP server per project", "risk": "Multiple servers would write to the same DB without locking" }

      ── ChangeEvent ───────────────────────────────────────────────────────────
      A concrete change that was made to code, config, dependencies, or behavior.
      Extract when you see a refactor, rename, migration, or any notable modification completed.
        name        — short label for the change
        description — what changed and why

      Examples:
        { "$type": "ChangeEvent", "name": "Unified annotateNode into insertEntries", "description": "annotateNode now delegates to insertEntries instead of having its own DB write path, removing duplicate validation" }
        { "$type": "ChangeEvent", "name": "Made embedding dimension configurable", "description": "Replaced hardcoded 128-dim vectors with a runtime dims parameter; default changed to 1536 to match text-embedding-3-small native size" }
    types:
      - Decision
      - Alternative
      - Assumption
      - ChangeEvent
