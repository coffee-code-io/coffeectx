types:
  AgentSession:
    description: One coding-agent working session (Claude Code / Codex / pi.dev) — a single conversation from start to finish. SessionId is namespaced by provider (e.g. "claude:<uuid>", "codex:<thread-id>", "pi:<uuid>").
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol    # provider-namespaced session id
      projectPath: Symbol  # cwd at session start
      startTime: Symbol    # ISO timestamp of first message
      model: Symbol        # e.g. "claude-sonnet-4-6", "gpt-5-codex", "qwen/qwen3-32b"
      provider: Symbol     # "claude" | "codex" | "pi"

  UserInput:
    description: A message typed by the user to the coding agent — the user's intent or feedback.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol         # message UUID
      timestamp: Symbol
      text: Meaning        # semantic content of the user's message
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedFiles:        # file paths mentioned or implied by the user (empty = none)
        kind: List
        item: Symbol
      relatedSymbols:      # LSP symbol nodes mentioned by the user — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  FileOperation:
    description: A file creation or edit performed by the coding agent — captures what changed and where.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      operation: Symbol    # "create" | "edit"
      path: Symbol         # absolute file path
      preview: Meaning     # first lines of new content, or the changed fragment
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      touchedSymbols:      # LSP symbol nodes in this file — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  ShellExecution:
    description: A shell command executed by the coding agent — build steps, test runs, git ops, etc.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      command: Symbol
      description: Meaning # agent-supplied description of what the command does
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer

  AgentQuestion:
    description: A clarifying question asked by the coding agent to the user before proceeding.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      question: Meaning    # the question text
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedSymbols:      # LSP symbol nodes mentioned in the question — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  AgentMessage:
    description: A plain-text reply from the coding agent to the user — status updates, explanations, summaries of what was done. Replaces AgentThought (modern LLM providers no longer expose chain-of-thought, so the user-facing message is now the primary signal of agent intent).
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      text: Meaning        # the assistant message body (markdown)
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedSymbols:      # LSP symbol nodes mentioned in the message — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  AgentSummary:
    description: A wrap-up message the agent emits at the end of a turn — explains what was done after tool calls completed. Distinct from in-progress narration (AgentMessage) which lives in assistant turns that ALSO contain tool calls; AgentSummary turns contain only text.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      text: Meaning        # the wrap-up text body (markdown)
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedSymbols:      # LSP symbol nodes mentioned in the summary — populated during LSP indexing
        kind: List
        item: AnyLspSymbol
