types:
  AgentSession:
    description: One coding-agent working session (Claude Code / Codex / pi.dev) — a single conversation from start to finish. SessionId is namespaced by provider (e.g. "claude:<uuid>", "codex:<thread-id>", "pi:<uuid>").
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol    # provider-namespaced session id
      projectPath: Symbol  # cwd at session start
      startTime: Symbol    # ISO timestamp of first message
      model: Symbol        # e.g. "claude-sonnet-4-6", "gpt-5-codex", "qwen/qwen3-32b"
      provider: Symbol     # "claude" | "codex" | "pi"

  UserInput:
    description: A message typed by the user to the coding agent — the user's intent or feedback.
    hidden: true
    states: [extracted, linked]   # extracted by the agent-log indexer; bumped to `linked` after LSP enrichment
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol         # message UUID
      timestamp: Symbol
      text: Symbol         # verbatim user message — Symbol (not Meaning) so it doesn't go into the vector store; UI renders markdown via length/markdown heuristic
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedFiles:        # file paths mentioned or implied by the user (empty = none)
        kind: List
        item: Symbol
      relatedSymbols:      # LSP symbol nodes mentioned by the user — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  FileOperation:
    description: A file creation or edit performed by the coding agent — captures what changed and where.
    hidden: true
    states: [extracted, linked]
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      operation: Symbol    # "create" | "edit"
      path: Symbol         # absolute file path
      content: Symbol      # FULL content (Write) or new_string (Edit) — Symbol so it doesn't embed; used for name-match enrichment
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      touchedSymbols:      # LSP symbol nodes whose name appears in `content` and whose file_path == `path` — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  ShellExecution:
    description: A shell command executed by the coding agent — build steps, test runs, git ops, etc.
    hidden: true
    states: [extracted, linked]
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      command: Symbol
      description: Symbol  # agent-supplied description of what the command does
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer

  AgentQuestion:
    description: A clarifying question asked by the coding agent to the user before proceeding.
    hidden: true
    states: [extracted, linked]
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      question: Symbol     # verbatim agent question — Symbol so it doesn't embed
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedSymbols:      # LSP symbol nodes mentioned in the question — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  AgentMessage:
    description: A plain-text reply from the coding agent to the user — status updates, explanations, summaries of what was done.
    hidden: true
    states: [extracted, linked]
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      text: Symbol         # assistant in-progress narration — Symbol so it doesn't embed (UI still renders markdown)
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedSymbols:      # LSP symbol nodes mentioned in the message — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  AgentSummary:
    description: A wrap-up message the agent emits at the end of a turn — explains what was done after tool calls completed.
    hidden: true
    states: [extracted, linked]
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      text: Symbol         # wrap-up narrative — Symbol so it doesn't embed
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this event was processed by the agent indexer
      relatedSymbols:      # LSP symbol nodes mentioned in the summary — populated during LSP indexing
        kind: List
        item: AnyLspSymbol
