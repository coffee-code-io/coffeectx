types:
  AgentSession:
    description: A Claude Code agent working session — a single conversation from start to finish.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol    # unique session UUID
      projectPath: Symbol  # cwd at session start
      startTime: Symbol    # ISO timestamp of first message
      model: Symbol        # e.g. "claude-sonnet-4-6"

  UserInput:
    description: A message typed by the user to the coding agent — the user's intent or feedback.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol         # message UUID
      timestamp: Symbol
      text: Meaning        # semantic content of the user's message
      comment: Meaning?    # optional analyst annotation
      relatedFiles:        # file paths mentioned or implied by the user (empty = none)
        kind: List
        item: Symbol
      relatedSymbols:      # LSP symbol nodes mentioned by the user — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  FileOperation:
    description: A file creation or edit performed by the coding agent — captures what changed and where.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      operation: Symbol    # "create" | "edit"
      path: Symbol         # absolute file path
      preview: Meaning     # first lines of new content, or the changed fragment
      thought: Meaning?    # agent's thinking block that preceded this operation
      comment: Meaning?    # optional analyst annotation
      touchedSymbols:      # LSP symbol nodes in this file — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

  ShellExecution:
    description: A shell command executed by the coding agent — build steps, test runs, git ops, etc.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      command: Symbol
      description: Meaning # agent-supplied description of what the command does
      thought: Meaning?    # agent's thinking block that preceded this command
      comment: Meaning?    # optional analyst annotation

  AgentQuestion:
    description: A clarifying question asked by the coding agent to the user before proceeding.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      timestamp: Symbol
      question: Meaning    # the question text
      thought: Meaning?    # agent's thinking block that preceded this question
      comment: Meaning?    # optional analyst annotation
      relatedSymbols:      # LSP symbol nodes mentioned in the question — populated during LSP indexing
        kind: List
        item: AnyLspSymbol

