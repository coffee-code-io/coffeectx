types:
  AgentSession:
    description: One coding-agent working session (Claude Code / Codex / pi.dev) — a single conversation from start to finish. SessionId is namespaced by provider (e.g. "claude:<uuid>", "codex:<thread-id>", "pi:<uuid>").
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol    # provider-namespaced session id
      projectPath: Symbol  # cwd at session start
      model: Symbol        # e.g. "claude-sonnet-4-6", "gpt-5-codex", "qwen/qwen3-32b"
      provider: Symbol     # "claude" | "codex" | "pi"

  # Per-event types below carry no `states` and no `comment`. Linking now
  # happens at the Span level (see `Span.touchedSymbols`); analyst
  # annotations live on (Local)Decision / Lsp* nodes instead.

  UserInput:
    description: A message typed by the user to the coding agent — the user's intent or feedback.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol         # message UUID
      text: Symbol         # verbatim user message

  FileOperation:
    description: A file creation or edit performed by the coding agent — captures what changed and where.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      operation: Symbol    # "create" | "edit"
      path: Symbol         # absolute file path
      content: Symbol      # FULL content (Write) or new_string (Edit)

  ShellExecution:
    description: A shell command executed by the coding agent — build steps, test runs, git ops, etc.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      command: Symbol
      description: Symbol  # agent-supplied description of what the command does

  AgentQuestion:
    description: A clarifying question asked by the coding agent to the user before proceeding.
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      question: Symbol     # verbatim agent question

  AgentMessage:
    description: A plain-text reply from the coding agent to the user — status updates, explanations, or end-of-span summaries (flagged via isSummary).
    hidden: true
    kind: Map
    fields:
      sessionId: Symbol
      uuid: Symbol
      text: Symbol         # message text — Symbol so it doesn't embed (UI renders markdown)
      isSummary: Symbol?   # "true" iff this is the terminating summary of a Span; absent otherwise

  Span:
    description: A contiguous run of agent activity within a session — kind is 'planning' or 'execution'. Closed spans terminate in an AgentMessage with isSummary="true". `filesChanged` is the union of FileOperation paths in the span; `touchedSymbols` are the latest-at-endedAt LSP symbol versions in those files.
    hidden: true
    states: [extracted, linked]
    kind: Map
    fields:
      sessionId: Symbol
      kind: Symbol                 # 'planning' | 'execution'
      startedAt: Symbol            # unix ms as string
      endedAt: Symbol
      messages:                    # ordered $id refs to events in this span
        kind: List
        item: AnyLogEvent
      summary: AgentMessage?       # terminating AgentMessage with isSummary="true"
      filesChanged:                # union of FileOperation.path values in this span
        kind: List
        item: Symbol
      touchedSymbols:              # latest-at-endedAt LSP symbol $ids for files in filesChanged
        kind: List
        item: AnyLspSymbol
      comment: Meaning?            # optional analyst annotation on the span as a whole

  AnyLogEvent:
    description: A reference to any indexed agent-log node — user input, message, file op, shell exec, question.
    kind: Or
    types:
      - UserInput
      - AgentMessage
      - AgentQuestion
      - FileOperation
      - ShellExecution
