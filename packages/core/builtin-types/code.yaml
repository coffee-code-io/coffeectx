types:
  # ── Shared base fields ────────────────────────────────────────────────────────
  # Every LSP symbol type below uses:
  #   name: Symbol          — the short identifier (e.g. "createUser")
  #   containerName: Symbol — fully qualified parent (e.g. "UserService"), empty if top-level
  #   detail: Symbol        — type signature or other detail string from the server
  #   file_path: Symbol     — repo-relative path of the source file
  #   line: Symbol          — 1-based line number, stored as a string for symbol-key uniformity
  #   column: Symbol        — 1-based column
  #   comment: Meaning?     — optional analyst/agent annotation
  #
  # Container types (Module / Namespace / Class) carry `children` — REAL $id refs
  # to nested LspMethod / LspConstructor / LspFunction / LspClass — filled by a
  # second pass once leaf $ids are known. Enum / Interface keep `members` as
  # plain string names (their members aren't standalone nodes).
  # ─────────────────────────────────────────────────────────────────────────────

  LspModule:
    description: A module symbol (SymbolKind 2) — a source file treated as a named module.
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      children:             # $id refs to nested LSP symbols
        kind: List
        item: AnyLspSymbol
      comment: Meaning?

  LspNamespace:
    description: A namespace or package symbol (SymbolKind 3) — a named scope grouping related declarations.
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      children:             # $id refs to nested LSP symbols
        kind: List
        item: AnyLspSymbol
      comment: Meaning?

  LspClass:
    description: A class declaration (SymbolKind 5) — a named type with fields and methods. Child methods/constructors are referenced via `children`. Property/field names are not surfaced separately.
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol        # e.g. "extends Base implements IFoo"
      file_path: Symbol
      line: Symbol
      column: Symbol
      children:             # $id refs to LspMethod / LspConstructor / nested LspClass
        kind: List
        item: AnyLspSymbol
      comment: Meaning?

  LspMethod:
    description: A method on a class or object (SymbolKind 6) — a named function scoped to a class.
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol  # owning class name
      detail: Symbol         # signature, e.g. "(id: string): Promise<User>"
      file_path: Symbol
      line: Symbol
      column: Symbol
      source: Symbol         # raw function body sliced from the snapshot file
      comment: Meaning?

  LspConstructor:
    description: A constructor function (SymbolKind 9) — the initializer for a class.
    kind: Map
    withHistory: true
    fields:
      name: Symbol           # usually the class name
      containerName: Symbol
      detail: Symbol         # parameter list
      file_path: Symbol
      line: Symbol
      column: Symbol
      source: Symbol         # raw constructor body sliced from the snapshot file
      comment: Meaning?

  LspEnum:
    description: An enum declaration (SymbolKind 10) — a named set of constant members. Member names are flattened into `members` (plain strings, not refs).
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      members:              # enum entry names
        kind: List
        item: Symbol
      comment: Meaning?

  LspInterface:
    description: An interface declaration (SymbolKind 11) — a structural type contract without implementation. Method/property/entry names are flattened into `members` (plain strings, not refs).
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      members:              # method/property/entry names
        kind: List
        item: Symbol
      comment: Meaning?

  LspFunction:
    description: A top-level or module-scoped function (SymbolKind 12) — not a method.
    kind: Map
    withHistory: true
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol         # signature
      file_path: Symbol
      line: Symbol
      column: Symbol
      source: Symbol         # raw function body sliced from the snapshot file
      comment: Meaning?

  # LspConstant / LspEnumMember / LspTypeParameter / LspVariable are intentionally
  # NOT indexed. Variables are nearly all local-scope; constants are usually
  # uninteresting module-level mutables (when they matter they appear as
  # LspFunction); enum members live inside LspEnum.members; type parameters
  # are name-only and rarely worth following.

  # ── Union type covering every indexed LSP symbol kind ────────────────────────
  # Use this as a field type when you want a reference to any indexed code symbol.
  # Example in data: { "$id": "<existing-node-uuid>" }
  AnyLspSymbol:
    description: A reference to any indexed LSP code symbol — function, class, method, interface, module, etc.
    kind: Or
    types:
      - LspModule
      - LspNamespace
      - LspClass
      - LspInterface
      - LspEnum
      - LspFunction
      - LspMethod
      - LspConstructor
