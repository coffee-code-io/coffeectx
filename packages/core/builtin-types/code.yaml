types:
  # ── Shared base fields ────────────────────────────────────────────────────────
  # Every LSP symbol type below uses:
  #   name: Symbol          — the short identifier (e.g. "createUser")
  #   containerName: Symbol — fully qualified parent (e.g. "UserService"), empty if top-level
  #   detail: Symbol        — type signature or other detail string from the server
  #   location: Location    — source position (from directory.yaml)
  #   comment: Meaning?     — optional analyst/agent annotation
  # ─────────────────────────────────────────────────────────────────────────────

  LspModule:
    description: A module symbol (SymbolKind 2) — a source file treated as a named module.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      location: Location
      comment: Meaning?

  LspNamespace:
    description: A namespace or package symbol (SymbolKind 3) — a named scope grouping related declarations.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      location: Location
      comment: Meaning?

  LspClass:
    description: A class declaration (SymbolKind 5) — a named type with fields and methods.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol        # e.g. "extends Base implements IFoo"
      location: Location
      comment: Meaning?

  LspMethod:
    description: A method on a class or object (SymbolKind 6) — a named function scoped to a class.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol  # owning class name
      detail: Symbol         # signature, e.g. "(id: string): Promise<User>"
      location: Location
      comment: Meaning?

  LspProperty:
    description: An object or class property (SymbolKind 7) — an accessor or computed member.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol         # declared type
      location: Location
      comment: Meaning?

  LspField:
    description: A class field or struct member (SymbolKind 8) — a stored data member.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol         # declared type
      location: Location
      comment: Meaning?

  LspConstructor:
    description: A constructor function (SymbolKind 9) — the initializer for a class.
    kind: Map
    fields:
      name: Symbol           # usually the class name
      containerName: Symbol
      detail: Symbol         # parameter list
      location: Location
      comment: Meaning?

  LspEnum:
    description: An enum declaration (SymbolKind 10) — a named set of constant members.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      location: Location
      comment: Meaning?

  LspInterface:
    description: An interface declaration (SymbolKind 11) — a structural type contract without implementation.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      location: Location
      comment: Meaning?

  LspFunction:
    description: A top-level or module-scoped function (SymbolKind 12) — not a method.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol         # signature
      location: Location
      comment: Meaning?

  LspVariable:
    description: A mutable variable declaration (SymbolKind 13) — let or var binding.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol         # inferred or declared type
      location: Location
      comment: Meaning?

  LspConstant:
    description: An immutable constant binding (SymbolKind 14) — const declaration or enum-like value.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      location: Location
      comment: Meaning?

  LspEnumMember:
    description: A single member of an enum (SymbolKind 22) — a named constant within an LspEnum.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol  # parent LspEnum name
      detail: Symbol         # numeric or string value
      location: Location
      comment: Meaning?

  LspTypeParameter:
    description: A generic type parameter (SymbolKind 26) — e.g. the T in Array<T>.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol  # owning class/function name
      detail: Symbol         # constraint, e.g. "extends object"
      location: Location
      comment: Meaning?

  # ── Union type covering every LSP symbol kind ────────────────────────────────
  # Use this as a field type when you want a reference to any indexed code symbol.
  # Example in data: { "$id": "<existing-node-uuid>" }
  AnyLspSymbol:
    description: A reference to any indexed LSP code symbol — function, class, method, interface, module, etc.
    kind: Or
    types:
      - LspModule
      - LspNamespace
      - LspClass
      - LspInterface
      - LspEnum
      - LspFunction
      - LspMethod
      - LspProperty
      - LspField
      - LspConstructor
      - LspVariable
      - LspConstant
      - LspEnumMember
      - LspTypeParameter
