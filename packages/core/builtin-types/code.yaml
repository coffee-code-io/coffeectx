types:
  # ── Shared base fields ────────────────────────────────────────────────────────
  # Every LSP symbol type below uses:
  #   name: Symbol          — the short identifier (e.g. "createUser")
  #   containerName: Symbol — fully qualified parent (e.g. "UserService"), empty if top-level
  #   detail: Symbol        — type signature or other detail string from the server
  #   file_path: Symbol     — repo-relative path of the source file (one indexed lookup)
  #   line: Symbol          — 1-based line number, stored as a string for symbol-key uniformity
  #   column: Symbol        — 1-based column
  #   comment: Meaning?     — optional analyst/agent annotation
  #
  # `location` / `file` / `folder` are gone: deeply-nested map joins for what is
  # really a primary-key lookup. `file_path` is now the single column we index on.
  # ─────────────────────────────────────────────────────────────────────────────

  LspModule:
    description: A module symbol (SymbolKind 2) — a source file treated as a named module.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  LspNamespace:
    description: A namespace or package symbol (SymbolKind 3) — a named scope grouping related declarations.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  LspClass:
    description: A class declaration (SymbolKind 5) — a named type with fields and methods. Property/field names are flattened into `members` rather than emitted as separate nodes; methods stay as standalone LspMethod entries.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol        # e.g. "extends Base implements IFoo"
      file_path: Symbol
      line: Symbol
      column: Symbol
      members:              # property/field names owned by this class (plain strings, not node refs)
        kind: List
        item: Symbol
      comment: Meaning?

  LspMethod:
    description: A method on a class or object (SymbolKind 6) — a named function scoped to a class.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol  # owning class name
      detail: Symbol         # signature, e.g. "(id: string): Promise<User>"
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  # LspProperty and LspField are intentionally not indexed as standalone nodes:
  # their names live in the parent class/interface's `members` symbol list. This
  # cuts thousands of low-value leaf rows out of the graph without losing the
  # "what fields does class X have" question.

  LspConstructor:
    description: A constructor function (SymbolKind 9) — the initializer for a class.
    kind: Map
    fields:
      name: Symbol           # usually the class name
      containerName: Symbol
      detail: Symbol         # parameter list
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  LspEnum:
    description: An enum declaration (SymbolKind 10) — a named set of constant members.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  LspInterface:
    description: An interface declaration (SymbolKind 11) — a structural type contract without implementation. Property/field names are flattened into `members` rather than emitted as separate nodes.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      members:              # property/field names owned by this interface (plain strings, not node refs)
        kind: List
        item: Symbol
      comment: Meaning?

  LspFunction:
    description: A top-level or module-scoped function (SymbolKind 12) — not a method.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol         # signature
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  # LspVariable is intentionally not indexed: nearly all such symbols are
  # local-scope bindings (already filtered by the LSP indexer's anonymous /
  # local-scope rules) or low-value module-level mutables. If a module-level
  # binding matters, it'll usually appear as LspConstant or LspFunction.

  LspConstant:
    description: An immutable constant binding (SymbolKind 14) — const declaration or enum-like value.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol
      detail: Symbol
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  LspEnumMember:
    description: A single member of an enum (SymbolKind 22) — a named constant within an LspEnum.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol  # parent LspEnum name
      detail: Symbol         # numeric or string value
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  LspTypeParameter:
    description: A generic type parameter (SymbolKind 26) — e.g. the T in Array<T>.
    kind: Map
    fields:
      name: Symbol
      containerName: Symbol  # owning class/function name
      detail: Symbol         # constraint, e.g. "extends object"
      file_path: Symbol
      line: Symbol
      column: Symbol
      comment: Meaning?

  # ── Union type covering every LSP symbol kind ────────────────────────────────
  # Use this as a field type when you want a reference to any indexed code symbol.
  # Example in data: { "$id": "<existing-node-uuid>" }
  AnyLspSymbol:
    description: A reference to any indexed LSP code symbol — function, class, method, interface, module, etc.
    kind: Or
    types:
      - LspModule
      - LspNamespace
      - LspClass
      - LspInterface
      - LspEnum
      - LspFunction
      - LspMethod
      - LspConstructor
      - LspConstant
      - LspEnumMember
      - LspTypeParameter
