types:
  Plan:
    description: A markdown plan authored during a Claude Code "plan mode" turn and saved by Claude to `~/.claude/plans/<slug>.md`. Plans capture the agent's intended implementation approach (context, files to modify, verification) before any code is written, so they're high-signal artefacts for understanding what was about to happen in a session.
    kind: Map
    fields:
      name: Symbol         # filename slug (no extension) — also the natural unique key
      path: Symbol         # absolute path to the .md file on disk
      createdAt: Symbol    # ISO timestamp (file birthtime if available, else mtime of first ingest)
      updatedAt: Symbol    # ISO timestamp of the file's last modification
      title: Meaning?      # first-line H1 (or first non-empty line) — extracted for summary search
      content: Meaning     # full markdown body
      comment: Meaning?    # optional analyst annotation
      agentIndexed: Symbol?  # ISO timestamp when this plan was processed by the agent indexer
