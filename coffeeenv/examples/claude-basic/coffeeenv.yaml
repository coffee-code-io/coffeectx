name: claude-basic
description: Minimal Claude Code setup — a CLAUDE.md, a permissive settings.json, and no MCP servers

tools:
  - name: claude
    source: npm
    package: "@anthropic-ai/claude-code"
    hijack: home

bins:
  - { name: jq, source: system }

claude:
  agents_md: ./CLAUDE.md
  settings: ./claude.settings.json
  mcp_servers: ./mcp/*.json

env: {}
